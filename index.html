<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>India Corporate Smart Tracker</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#000;color:#fff;padding:15px;line-height:1.5}
.container{max-width:650px;margin:0 auto}
button,input,select{width:100%;padding:14px;border:none;border-radius:12px;margin:8px 0;box-sizing:border-box}
button{background:#2563eb;color:#fff;font-weight:bold;cursor:pointer}
input,select{background:#111;color:#fff;border:1px solid #333}
.card{background:#111;padding:16px;border-radius:16px;margin:12px 0;border:1px solid #222}
.tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold;text-transform:uppercase;margin-bottom:8px;display:inline-block}
.tag-mgt{background:#1e3a8a;color:#60a5fa}
.tag-results{background:#581c87;color:#d8b4fe}
.tag-special{background:#14532d;color:#bef264}
.ch-name{color:#888; font-size:11px; font-weight:bold; text-transform:uppercase}
.title{margin:5px 0 12px 0; font-size:15px; font-weight:500; color:#eee}
a{color:#4da6ff;text-decoration:none;font-weight:bold;font-size:14px;border:1px solid #4da6ff;padding:6px 12px;border-radius:8px;display:inline-block}
</style>
</head>
<body>

<div class="container">
    <h2>📈 India Corporate Tracker</h2>
    <div style="font-size:12px; color:#666; margin-bottom:15px">Broad Window Scanning for Maximum Coverage</div>

    <input id="apikey" type="password" placeholder="Paste YouTube API Key">
    
    <label style="font-size:12px; color:#888">Select Search Date:</label>
    <input type="date" id="searchDate">

    <button onclick="runScan()">Deep Scan Channels</button>

    <div id="results"></div>
</div>

<script>
const channels = [
    { name: "CNBC-TV18", id: "UC_glS8p_mCid6AnA6V75AJA" },
    { name: "ET NOW", id: "UCI_mwTKUhicNzFrhm33MzBQ" },
    { name: "NDTV Profit", id: "UC3uJIdRFTGgLWrUziaHbzrg" },
    { name: "ET NOW Swadesh", id: "UC9p6_Ksq7_K75W-V9S0M-pA" }
];

// Maximum possible keyword inclusion
const allKeywords = [
    "ceo", "cfo", "md", "chairman", "director", "founder", "promoter", 
    "management", "interaction", "interview", "results", "earnings", 
    "q1", "q2", "q3", "q4", "guidance", "concall", "outlook",
    "know your company", "all about my company", "corporate radar"
];

document.getElementById('searchDate').valueAsDate = new Date();

async function runScan() {
    const key = document.getElementById("apikey").value.trim();
    const dateStr = document.getElementById("searchDate").value;
    if(!key) { alert("API Key Required"); return; }

    const resDiv = document.getElementById("results");
    resDiv.innerHTML = "Scanning all formats with 48-hour buffer...";

    // Fixed Timezone Handling: 
    // We scan 12 hours BEFORE the start of the date and 12 hours AFTER the end.
    // This catches everything regardless of UTC/IST shifts.
    const baseDate = new Date(dateStr);
    
    const start = new Date(baseDate);
    start.setHours(start.getHours() - 12);
    
    const end = new Date(baseDate);
    end.setHours(end.getHours() + 36);

    let allVideos = [];

    for (let c of channels) {
        let url = `https://www.googleapis.com/youtube/v3/search?key=${key}&channelId=${c.id}&part=snippet&order=date&maxResults=50&publishedAfter=${start.toISOString()}&publishedBefore=${end.toISOString()}`;

        try {
            let res = await fetch(url);
            let data = await res.json();

            if (data.items) {
                data.items.forEach(item => {
                    let title = item.snippet.title.toLowerCase();
                    
                    // Simple, broad matching
                    const isRelevant = allKeywords.some(w => title.includes(w));

                    if (isRelevant) {
                        // Intelligent tagging
                        let cat = "Management Interview";
                        let cls = "tag-mgt";

                        if(title.includes("know your company") || title.includes("all about my company")) {
                            cat = "Special Segment"; cls = "tag-special";
                        } else if(title.match(/q[1-4]/) || title.includes("results")) {
                            cat = "Earnings/Results"; cls = "tag-results";
                        }

                        allVideos.push({
                            channel: c.name,
                            title: item.snippet.title,
                            category: cat,
                            tagClass: cls,
                            link: `https://youtube.com/watch?v=${item.id.videoId}`
                        });
                    }
                });
            }
        } catch (e) { console.error("Error fetching from " + c.name); }
    }

    let html = "";
    if (allVideos.length === 0) {
        html = "<p style='color:#666; font-size:13px; text-align:center;'>No matching interviews found.</p>";
    } else {
        // Use a Map to remove duplicates that might occur due to the 48-hour window
        const uniqueVideos = Array.from(new Map(allVideos.map(v => [v.link, v])).values());
        
        uniqueVideos.forEach(v => {
            html += `
            <div class="card">
                <span class="ch-name">${v.channel}</span><br>
                <span class="tag ${v.tagClass}">${v.category}</span>
                <div class="title">${v.title}</div>
                <a href="${v.link}" target="_blank">Watch Video →</a>
            </div>`;
        });
    }
    resDiv.innerHTML = html;
}
</script>

</body>
</html>
