<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>India Corporate Tracker</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#000;color:#fff;padding:15px}
.container{max-width:650px;margin:0 auto}
button,input,select{width:100%;padding:14px;border:none;border-radius:12px;margin:8px 0;box-sizing:border-box}
button{background:#2563eb;color:#fff;font-weight:bold;cursor:pointer}
input,select{background:#111;color:#fff;border:1px solid #333}
.card{background:#111;padding:16px;border-radius:16px;margin:12px 0;border:1px solid #222}
.tag-mgt{background:#1e3a8a;color:#60a5fa;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold;text-transform:uppercase}
.tag-kyc{background:#365314;color:#bef264;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold;text-transform:uppercase}
.ch-name{color:#888; font-size:12px; font-weight:bold}
.title{margin:10px 0; font-size:15px; font-weight:500; color:#eee}
a{color:#4da6ff;text-decoration:none;font-weight:bold;font-size:14px}
</style>
</head>
<body>

<div class="container">
    <h2>🏢 India Corporate Tracker</h2>
    <div style="font-size:12px; color:#666; margin-bottom:15px">Capturing Management, Know Your Company, & Earnings</div>

    <input id="apikey" type="password" placeholder="Paste YouTube API Key">
    
    <label style="font-size:12px; color:#888">Select Search Date:</label>
    <input type="date" id="searchDate">

    <button onclick="runScan()">Scan All Formats</button>

    <div id="results"></div>
</div>

<script>
const channels = [
    { name: "CNBC-TV18", id: "UC_glS8p_mCid6AnA6V75AJA" },
    { name: "ET NOW", id: "UCI_mwTKUhicNzFrhm33MzBQ" },
    { name: "NDTV Profit", id: "UC3uJIdRFTGgLWrUziaHbzrg" },
    { name: "ET NOW Swadesh", id: "UC9p6_Ksq7_K75W-V9S0M-pA" }
];

// Refined keywords for Indian Business segment naming conventions
const mgtWords = ["management", "ceo", "cfo", "md", "chairman", "results", "guidance", "concall", "interaction"];
const kycWords = ["know your company", "all about my company", "corporate room", "earnings call", "quarterly"];

document.getElementById('searchDate').valueAsDate = new Date();

async function runScan() {
    const key = document.getElementById("apikey").value.trim();
    const date = document.getElementById("searchDate").value;
    if(!key) { alert("API Key Required"); return; }

    const resDiv = document.getElementById("results");
    resDiv.innerHTML = "Performing Deep Scan...";

    const start = new Date(date); start.setHours(0,0,0,0);
    const end = new Date(date); end.setHours(23,59,59,999);

    let allVideos = [];

    for (let c of channels) {
        // We use a broad search for the day to catch 'Live' and 'Video' uploads
        let url = `https://www.googleapis.com/youtube/v3/search?key=${key}&channelId=${c.id}&part=snippet&order=date&maxResults=50&publishedAfter=${start.toISOString()}&publishedBefore=${end.toISOString()}`;

        try {
            let res = await fetch(url);
            let data = await res.json();

            if (data.items) {
                data.items.forEach(item => {
                    let title = item.snippet.title.toLowerCase();
                    
                    let isMgt = mgtWords.some(w => title.includes(w));
                    let isKyc = kycWords.some(w => title.includes(w));

                    if (isMgt || isKyc) {
                        allVideos.push({
                            channel: c.name,
                            title: item.snippet.title,
                            type: isKyc ? "Special Segment" : "Management",
                            link: `https://youtube.com/watch?v=${item.id.videoId}`
                        });
                    }
                });
            }
        } catch (e) { console.error(e); }
    }

    // Render results
    let html = "";
    if (allVideos.length === 0) {
        html = "<p style='color:#666; font-size:13px'>No corporate interviews found. Note: If it's early morning, channels may not have uploaded yet.</p>";
    } else {
        allVideos.forEach(v => {
            let tagClass = v.type === "Management" ? "tag-mgt" : "tag-kyc";
            html += `
            <div class="card">
                <span class="ch-name">${v.channel}</span> &nbsp; <span class="${tagClass}">${v.type}</span>
                <div class="title">${v.title}</div>
                <a href="${v.link}" target="_blank">Watch on YouTube →</a>
            </div>`;
        });
    }
    resDiv.innerHTML = html;
}
</script>

</body>
</html>
