<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>India Smart Tracker: Full Market Intelligence</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#000;color:#fff;padding:15px;line-height:1.5}
.container{max-width:650px;margin:0 auto}
button,input,select{width:100%;padding:14px;border:none;border-radius:12px;margin:8px 0;box-sizing:border-box}
button{background:#2563eb;color:#fff;font-weight:bold;cursor:pointer}
input,select{background:#111;color:#fff;border:1px solid #333}
.card{background:#111;padding:16px;border-radius:16px;margin:12px 0;border:1px solid #222}
.tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold;text-transform:uppercase;margin-bottom:8px;display:inline-block}
.tag-mgt{background:#1e3a8a;color:#60a5fa} /* Management/Results */
.tag-strategy{background:#5b21b6;color:#ddd6fe} /* Vedanta/Value Unlocking style */
.tag-analysis{background:#92400e;color:#fde68a} /* Amara Raja/3 Reasons style */
.tag-special{background:#14532d;color:#bef264} /* KYC */
.ch-name{color:#888; font-size:11px; font-weight:bold; text-transform:uppercase}
.title{margin:5px 0 12px 0; font-size:15px; font-weight:500; color:#eee}
a{color:#4da6ff;text-decoration:none;font-weight:bold;font-size:14px;border:1px solid #4da6ff;padding:6px 12px;border-radius:8px;display:inline-block}
</style>
</head>
<body>

<div class="container">
    <h2>📈 India Smart Tracker</h2>
    <div style="font-size:12px; color:#666; margin-bottom:15px">Interviews • Results • Value Unlocking • Tailwinds</div>

    <input id="apikey" type="password" placeholder="Paste YouTube API Key">
    
    <label style="font-size:12px; color:#888">Select Search Date:</label>
    <input type="date" id="searchDate">

    <button onclick="runScan()">Scan Market Intelligence</button>

    <div id="results"></div>
</div>

<script>
const channels = [
    { name: "CNBC-TV18", pId: "UU_glS8p_mCid6AnA6V75AJA" },
    { name: "ET NOW", pId: "UUI_mwTKUhicNzFrhm33MzBQ" },
    { name: "NDTV Profit", pId: "UU3uJIdRFTGgLWrUziaHbzrg" },
    { name: "ET NOW Swadesh", pId: "UU9p6_Ksq7_K75W-V9S0M-pA" }
];

// Trigger Groups
const mgt = ["ceo", "cfo", "md", "chairman", "management", "interaction", "interview", "results", "earnings", "q1", "q2", "q3", "q4"];
const strategy = ["unlock", "tailwinds", "upside", "demerger", "potential", "trigger", "outlook", "re-rating"];
const action = ["reasons why", "share price", "jumps", "falls", "surges", "capex", "order win", "deal", "stake sale", "brokerage"];
const kyc = ["know your company", "all about my company", "corporate radar"];

document.getElementById('searchDate').valueAsDate = new Date();

async function runScan() {
    const key = document.getElementById("apikey").value.trim();
    const dateStr = document.getElementById("searchDate").value;
    if(!key) { alert("API Key Required"); return; }

    const resDiv = document.getElementById("results");
    resDiv.innerHTML = "Performing Deep Keyword Scan...";

    let allVideos = [];

    for (let c of channels) {
        let url = `https://www.googleapis.com/youtube/v3/playlistItems?key=${key}&playlistId=${c.pId}&part=snippet&maxResults=50`;

        try {
            let res = await fetch(url);
            let data = await res.json();

            if (data.items) {
                data.items.forEach(item => {
                    let title = item.snippet.title.toLowerCase();
                    let pubDate = item.snippet.publishedAt.substring(0, 10);
                    
                    const isMgt = mgt.some(t => title.includes(t));
                    const isStrat = strategy.some(t => title.includes(t));
                    const isAct = action.some(t => title.includes(t));
                    const isKyc = kyc.some(t => title.includes(t));

                    if (pubDate === dateStr && (isMgt || isStrat || isAct || isKyc)) {
                        let cat = "Management Interview";
                        let cls = "tag-mgt";

                        if(isKyc) { cat = "Special Segment"; cls = "tag-special"; }
                        else if(isStrat) { cat = "Strategy & Tailwinds"; cls = "tag-strategy"; }
                        else if(isAct) { cat = "Stock Analysis"; cls = "tag-analysis"; }

                        allVideos.push({
                            channel: c.name,
                            title: item.snippet.title,
                            category: cat,
                            tagClass: cls,
                            link: `https://youtube.com/watch?v=${item.snippet.resourceId.videoId}`
                        });
                    }
                });
            }
        } catch (e) { console.error(e); }
    }

    let html = "";
    if (allVideos.length === 0) {
        html = "<p style='color:#666; font-size:13px; text-align:center;'>No matching stock content found for this date.</p>";
    } else {
        allVideos.forEach(v => {
            html += `
            <div class="card">
                <span class="ch-name">${v.channel}</span><br>
                <span class="tag ${v.tagClass}">${v.category}</span>
                <div class="title">${v.title}</div>
                <a href="${v.link}" target="_blank">Watch Video →</a>
            </div>`;
        });
    }
    resDiv.innerHTML = html;
}
</script>

</body>
</html>
