<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>India Tracker Live</title>
<style>
body{font-family:Arial;background:#000;color:#fff;padding:15px}
button,input{width:100%;padding:14px;border:none;border-radius:14px;margin:8px 0}
button{background:#fff;color:#000;font-weight:bold}
.card{background:#111;padding:14px;border-radius:16px;margin:10px 0}
.small{color:#aaa;font-size:13px}
a{color:#4da6ff}
</style>
</head>
<body>

<h2>📈 India Tracker Live</h2>

<input id="apikey" placeholder="Paste YouTube API Key">
<button onclick="runScan()">Run Live Scan</button>

<div id="results"></div>

<script>
const channels = [
{ name:"CNBC TV18", id:"UCvJJ_dzjViJCoLf5uKUTwoA"},
{ name:"ET NOW", id:"UC6RJ7-PaXg6TIH2BzZfTV7w"},
{ name:"NDTV Profit", id:"UC3uJIdRFTGgLWrUziaHbzrg"}
];

async function runScan(){
let key=document.getElementById("apikey").value.trim();
if(!key){alert("Paste API key"); return;}

let out="";
document.getElementById("results").innerHTML="Loading...";

for(let c of channels){
let url=`https://www.googleapis.com/youtube/v3/search?key=${key}&channelId=${c.id}&part=snippet&order=date&maxResults=5&type=video`;

let res=await fetch(url);
let data=await res.json();

if(data.items){
for(let v of data.items){
out += `
<div class="card">
<b>${c.name}</b><br>
${v.snippet.title}<br>
<span class='small'>${v.snippet.publishedAt}</span><br><br>
<a href="https://youtube.com/watch?v=${v.id.videoId}" target="_blank">Open YouTube</a>
</div>`;
}
}
}

document.getElementById("results").innerHTML=out || "No results";
}
</script>

</body>
</html>
